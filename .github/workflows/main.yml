name: Auto update main

on:
  push:
    branches:
      - dev

permissions:
  contents: write

jobs:
  merge-to-main:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Git identity
        run: |
          git config user.name "Application-Development-Department"
          git config user.email "app.development@mects.co.mz"

      - name: Merge dev into main (safe)
        run: |
          git fetch origin
          git checkout main
          git pull origin main

          # Try fast-forward first
          if git merge --ff-only origin/dev; then
            echo "Fast-forward merge successful"
          else
            echo "Fast-forward failed, trying normal merge"
            git merge origin/dev --no-edit || exit 1
          fi

          git push origin main