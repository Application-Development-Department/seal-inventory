name: Seal Inventory CI

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  quality:
    runs-on: ubuntu-latest

    env:
      PYTHON_VERSION: "3.11"

    steps:
      # Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      # System dependencies (SQL Server support)
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unixodbc-dev gcc

      # Install Python dependencies (pyproject)
      - name: Install project
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install .

      # Install dev tools (only if not included in pyproject)
      - name: Install dev tools
        run: |
          pip install black isort flake8 pytest httpx

      # Check imports
      - name: isort check
        run: isort --check-only src scripts

      # Code formatting
      - name: black check
        run: black --check src scripts

      # Linting
      - name: flake8 lint
        run: flake8 src scripts

      # Run tests
      - name: pytest
        run: pytest tests

  docker:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Build containers
      - name: Build Docker containers
        run: docker compose build

      # Run containers (detached)
      - name: Run containers
        run: docker compose up -d