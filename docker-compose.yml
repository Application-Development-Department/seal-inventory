services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seal-inventory-api
    env_file:
      - config/settings.seal_inventory.env
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
    command: uvicorn seal_inventory.api.app:app --host 0.0.0.0 --port 8000 --reload
